<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hiệu Ứng Trái Tim Kiểu TikTok</title>
<style>
  body {
    margin: 0;
    background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
    height: 100vh;
    overflow: hidden;
    position: relative;
    user-select: none;
    cursor: pointer;
  }
  .heart {
    position: absolute;
    width: 30px;
    height: 30px;
    background: linear-gradient(45deg, #ff3c78, #ff2a68);
    transform: rotate(-45deg);
    filter: drop-shadow(0 0 3px #ff2a68);
    animation: floatUp 1.5s forwards;
    pointer-events: none;
    opacity: 1;
    z-index: 1000;
  }
  .heart::before,
  .heart::after {
    content: "";
    position: absolute;
    width: 30px;
    height: 30px;
    background: linear-gradient(45deg, #ff3c78, #ff2a68);
    border-radius: 50%;
  }
  .heart::before {
    top: -15px;
    left: 0;
  }
  .heart::after {
    left: 15px;
    top: 0;
  }

  @keyframes floatUp {
    0% {
      opacity: 1;
      transform: translateY(0) rotate(-45deg) scale(1);
    }
    100% {
      opacity: 0;
      transform: translateY(-150px) rotate(-45deg) scale(1.5);
    }
  }
</style>
</head>
<body>
<script>
  document.body.addEventListener("click", (e) => {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.style.left = e.clientX - 15 + "px";
    heart.style.top = e.clientY - 15 + "px";
    document.body.appendChild(heart);
    setTimeout(() => {
      heart.remove();
    }, 1500);
  });
</script>
</body>
</html>
