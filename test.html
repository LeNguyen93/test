<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vũ trụ huyền ảo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; overflow: hidden; background: black; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.161.0/examples/js/controls/OrbitControls.js"></script>
  <script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.z = 5;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);

    // Tạo quả cầu trung tâm phát sáng
    const sphereGeometry = new THREE.SphereGeometry(0.3, 32, 32);
    const sphereMaterial = new THREE.MeshBasicMaterial({ color: 0xff99ff });
    const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
    scene.add(sphere);

    // Hiệu ứng phát sáng xung quanh (glow aura)
    const spriteMaterial = new THREE.SpriteMaterial({ 
      map: new THREE.TextureLoader().load('https://threejs.org/examples/textures/lensflare/lensflare0.png'),
      color: 0xff99ff, transparent: true, opacity: 0.4
    });
    const glow = new THREE.Sprite(spriteMaterial);
    glow.scale.set(2, 2, 1);
    sphere.add(glow);

    // Tạo các hạt phát sáng (star particles)
    const particles = new THREE.Geometry();
    for (let i = 0; i < 1000; i++) {
      const vertex = new THREE.Vector3(
        (Math.random() - 0.5) * 20,
        (Math.random() - 0.5) * 20,
        (Math.random() - 0.5) * 20
      );
      particles.vertices.push(vertex);
    }

    const particleMaterial = new THREE.PointsMaterial({
      color: 0xffffff,
      size: 0.03
    });
    const particleSystem = new THREE.Points(particles, particleMaterial);
    scene.add(particleSystem);

    // Tạo hiệu ứng sương mù màu
    const fogColors = [0x66ccff, 0xff66cc, 0xccff66, 0x9966ff];
    fogColors.forEach((color, i) => {
      const fogGeo = new THREE.SphereGeometry(3, 32, 32);
      const fogMat = new THREE.MeshBasicMaterial({ 
        color: color, 
        transparent: true, 
        opacity: 0.08 
      });
      const fogMesh = new THREE.Mesh(fogGeo, fogMat);
      fogMesh.position.set(
        Math.sin(i * 1.5) * 2,
        Math.cos(i * 1.5) * 1.5,
        Math.sin(i) * 2
      );
      scene.add(fogMesh);
    });

    // Animate
    function animate() {
      requestAnimationFrame(animate);
      particleSystem.rotation.y += 0.0015;
      sphere.rotation.y += 0.005;
      glow.rotation.z += 0.001;
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth/window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
