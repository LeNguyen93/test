<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Anh Thương Em ✨</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: black;
      overflow: hidden;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      perspective: 800px;
    }

    /* ⭐ Nền ngôi sao lấp lánh */
    .stars {
      position: fixed;
      width: 100%;
      height: 100%;
      background: transparent;
      z-index: 0;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      opacity: 0.8;
      animation: twinkle 2s infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    /* 🌠 Sao băng */
    .shooting-star {
      position: absolute;
      width: 120px;
      height: 2px;
      background: linear-gradient(90deg, white, rgba(255,255,255,0));
      animation: shoot 4s linear infinite;
      opacity: 0.7;
    }

    @keyframes shoot {
      0% {
        top: -10%;
        left: 120%;
        transform: rotate(-45deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        top: 110%;
        left: -20%;
        transform: rotate(-45deg);
        opacity: 0;
      }
    }

    /* 💬 Chữ rơi từ trên xuống */
    .text {
      position: absolute;
      top: -50px;
      left: 50%;
      transform: translateX(-50%) rotateX(30deg);
      color: #ff7eb9;
      font-size: 40px;
      font-weight: bold;
      text-shadow: 0 0 10px #ff7eb9, 0 0 20px #ff2d95;
      animation: fall 8s linear infinite;
      z-index: 1;
    }

    @keyframes fall {
      0% {
        top: -60px;
        opacity: 0;
        transform: translateX(-50%) rotateX(30deg) translateZ(0px);
      }
      30% {
        opacity: 1;
      }
      100% {
        top: 100%;
        opacity: 0;
        transform: translateX(-50%) rotateX(30deg) translateZ(-200px);
      }
    }
  </style>
</head>
<body>

  <!-- 🌌 Ngôi sao lấp lánh -->
  <div class="stars" id="stars"></div>

  <!-- 🌠 Sao băng -->
  <div class="shooting-star" style="top: 20%; left: 90%; animation-delay: 0s;"></div>
  <div class="shooting-star" style="top: 40%; left: 80%; animation-delay: 2s;"></div>
  <div class="shooting-star" style="top: 60%; left: 85%; animation-delay: 4s;"></div>

  <!-- 💬 Dòng chữ rơi -->
  <div class="text" style="animation-delay: 0s;">Anh thương em</div>
  <div class="text" style="animation-delay: 2s;">I love you</div>
  <div class="text" style="animation-delay: 4s;">Anh thương em</div>
  <div class="text" style="animation-delay: 6s;">I love you</div>

  <script>
    // ⭐ Tạo ngẫu nhiên nhiều ngôi sao
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 150; i++) {
      const star = document.createElement('div');
      star.classList.add('star');
      star.style.top = Math.random() * 100 + '%';
      star.style.left = Math.random() * 100 + '%';
      star.style.animationDuration = (1 + Math.random() * 2) + 's';
      starsContainer.appendChild(star);
    }
  </script>

</body>
</html>
